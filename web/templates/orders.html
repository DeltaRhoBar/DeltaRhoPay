<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orders Overview with Search and Date Range</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4 text-center">Orders Overview</h1>

    <div class="row mb-3 g-3 align-items-center">
      <div class="col-md-6">
        <input
          type="text"
          id="search-name"
          class="form-control"
          placeholder="Search by resident name..."
          aria-label="Search by resident name"
        />
      </div>
      <div class="col-md-3">
        <input
          type="date"
          id="start-date"
          class="form-control"
          aria-label="Start date"
        />
      </div>
      <div class="col-md-3">
        <input
          type="date"
          id="end-date"
          class="form-control"
          aria-label="End date"
        />
      </div>
    </div>

            <table
                class="table table-striped table-bordered align-middle shadow-sm"
                id="orders-table">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Resident</th>
                        <th scope="col">Room</th>
                        <th scope="col">Beverage</th>
                        <th scope="col">Amount</th>
                        <th scope="col">Total</th>
                        <th scope="col">Date</th>
                        <th scope="col">Paid</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    {{range .Orders}}
                    <tr>
                        <td>{{.Resident}}</td>
                        <td>{{.R_floor}}/{{.R_nr}}</td>
                        <td>{{.Beverage}}</td>
                        <td>{{.Amount}}</td>
                        <td>{{trailingZero .Price}}€</td>
                        <td>{{.Date}}</td>
                        {{ if .Paid}}
                        <td><span class="badge bg-success">Paid</span></td>
                        {{else}}
                        <td><span class="badge bg-danger">Unpaid</span></td>
                        {{end}}
                    </tr>
                    {{end}}
                </tbody>
            </table>
            <div class="d-flex justify-content-center align-items-center mt-3 gap-3">
                <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
                <span id="page-indicator" class="fw-bold">1</span>
                <button id="next-btn" class="btn btn-secondary" disabled>Next</button>
            </div>
        </div>

        <script>
        const pageIndicator = document.getElementById('page-indicator');
        const list = document.getElementById('orders-body');
        const nextPageButton = document.getElementById('next-btn');
        const prevPageButton = document.getElementById('prev-btn');
        nextPageButton.disabled = list.children.length < 50;
        const refreshOrders = async function() {
            list.innerHTML = '';
            const params = new URLSearchParams({ Nr: Number(pageIndicator.textContent) });

            const response = await fetch(`/getOrders?${params}`, {
                method: 'GET'
            });
            if(response.ok) {
                let result = await response.json();
                result.orders.forEach((order) => {
                    const resident = order.Resident;
                    const r_floor = order.R_floor;
                    const r_nr = order.R_nr;
                    const beverage = order.Beverage;
                    const amount = order.Amount;
                    const price = order.Price;
                    const date = order.Date;
                    const paid = order.Paid;
                    const tmpl = 
                        `
<tr>
<td>${resident}</td>
<td>${r_floor}/${r_nr}</td>
<td>${beverage}</td>
<td>${amount}</td>
<td>${(price/100).toFixed(2)}€</td>
<td>${date}</td>
<td><span class="badge ${paid? 'bg-success' : 'bg-danger'}">${paid? 'Paid' : 'Unpaid'}</span></td>
</tr>
`;
                    list.insertAdjacentHTML('beforeend', tmpl)
                });
            }
        }

        nextPageButton.addEventListener("click", async function() {
            pageIndicator.textContent = Number(pageIndicator.textContent) + 1;
            prevPageButton.disabled = false;                
            await refreshOrders(Number(pageIndicator.textContent));
            nextPageButton.disabled = list.children.length < 50;
        });
        prevPageButton.addEventListener("click", async function() {
            pageIndicator.textContent = Number(pageIndicator.textContent) - 1;
            prevPageButton.disabled = Number(pageIndicator.textContent) <= 1;                
            await refreshOrders(Number(pageIndicator.textContent));
            nextPageButton.disabled = list.children.length < 50;
        });
        const searchInput = document.getElementById('search-name');
        const startDateInput = document.getElementById('start-date');
        const endDateInput = document.getElementById('end-date');
        const ordersBody = document.getElementById('orders-body');

    function filterOrders() {
      const searchValue = searchInput.value.toLowerCase();
      const startDate = startDateInput.value;
      const endDate = endDateInput.value;

      const rows = ordersBody.querySelectorAll('tr');

      rows.forEach(row => {
        const residentName = row.cells[0].textContent.toLowerCase();
        const date = row.cells[6].textContent;

        let matchesSearch = residentName.includes(searchValue);
        let matchesStartDate = true;
        let matchesEndDate = true;

        if (startDate) {
          matchesStartDate = date >= startDate;
        }
        if (endDate) {
          matchesEndDate = date <= endDate;
        }

        if (matchesSearch && matchesStartDate && matchesEndDate) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    searchInput.addEventListener('input', filterOrders);
    startDateInput.addEventListener('change', filterOrders);
    endDateInput.addEventListener('change', filterOrders);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
