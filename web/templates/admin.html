<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Bootstrap Card Page</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body class="bg-light p-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title mb-4">Add Resident</h5>
                            <form>
                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="field1" class="form-label">Room Floor</label>
                                        <input type="number" id="r_floor_field" class="form-control" min="0" max="99" />
                                    </div>
                                    <div class="col-md-3 mb-3">
                                        <label for="field2" class="form-label">Room Nr</label>
                                        <input type="number" id="r_nr_field" class="form-control" min="0" max="99" />
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="field3" class="form-label">Name</label>
                                        <input type="text" id="name_field" class="form-control" />
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Add</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script> 
document.querySelector('form').addEventListener('submit', async function(event) {
  event.preventDefault();

  const data = {
    R_floor: Number(document.getElementById('r_floor_field').value),
    R_nr: Number(document.getElementById('r_nr_field').value),
    Name: document.getElementById('name_field').value
  };

  try {
    // Step 1: initial check
    let response = await fetch('/addResident', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    let result = await response.json();

    if (result.occupied) {
      // Show alert from server message, wait for user
      if (confirm(result.message || "Room is already occupied. Proceed anyway?")) {
        // Step 2: user confirmed, send forced update
        response = await fetch('/forceAddResident', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const finalResult = await response.json();
        alert(finalResult.message || "Update successful!");
      }
    } else {
      // Room not occupied, proceed normally
      alert(result.message || "Operation successful!");
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to submit form. Please try again.');
  }
});

        </script>
    </body>
</html>
