<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Two-Column List with Full-Width Item</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
        <style>
        body {
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }
        /* Sticky search bar */
        .search-bar-wrapper {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #f8f9fa;
            padding: 0.75rem 0;
            border-bottom: 1px solid #dee2e6;
        }
        /* Scrollable two-column list */
        .list-container {
            height: calc(100vh - 75px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .item-card {
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            padding: 1rem;
            background: #fff;
        }
        </style>
    </head>
    <body>
        <div class="container py-2 h-100">
            <!-- Sticky Search Bar -->
            <div class="search-bar-wrapper d-flex align-items-center gap-2 bg-light">
                <div class="flex-grow-1">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" placeholder="Search..." id="searchInput" />
                    </div>
                </div>
                <a href="/admin" class="btn btn-primary flex-shrink-0" id="settingsBtn" title="Settings">
                    <i class="bi bi-gear-fill"></i>
                </a>
            </div>
            <!-- Scrollable list -->
            <div class="list-container mt-3">
                <div class="row g-3" id="gridList">
                    <!-- Full-width special item with two fields -->
                    {{range .Residents}}
                    <div class="col-12">
                        <div id="{{.Room.Floor}}{{leadingZero .Room.Nr}}" class="item-card" style="padding: 0.5rem; font-family: 'Courier', Courier, monospace;">
                            <div class="row">
                                <div class="col-3">
                                    <p class="room" style="margin: 0.25rem 0; line-height: 0.5;">{{leadingZero .Room.Floor}}-{{leadingZero .Room.Nr}}</p>
                                </div>
                                <div class="col">
                                    <p class="name" style="margin: 0.25rem 0; line-height: 0.5;">{{.Name}}</p>
                                </div>
                                <div class="col-2">
                                    <p class="debt" style="margin: 0.25rem 0; line-height: 0.5;">{{.Debt}}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    {{end}}
                </div>
            </div>
        </div>

  <script>
    // Simple search filter
    const searchInput = document.getElementById("searchInput");
    const items = document.querySelectorAll("#gridList .item-card");

    searchInput.addEventListener("input", function () {
      const query = this.value.toLowerCase();
      items.forEach((item) => {
        const room = item.querySelector(".room").textContent;
        const name = item.querySelector(".name").textContent.toLowerCase();
        const id = item.id;
        item.parentElement.style.display = (room.includes(query) || name.includes(query) || id.includes(query)) ? "" : "none";
      });
    });
  </script>
</body>
</html>
