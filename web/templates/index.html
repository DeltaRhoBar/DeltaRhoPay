<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Two-Column List with Full-Width Item</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
        <style>
        body {
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }
        /* Sticky search bar */
        .search-bar-wrapper {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #f8f9fa;
            padding: 0.75rem 0;
            border-bottom: 1px solid #dee2e6;
        }
        /* Scrollable two-column list */
        .list-container {
            height: calc(100vh - 75px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .item-card {
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            padding: 1rem;
            background: #fff;
        }
        </style>
    </head>
    <body>
        <div class="container py-2 h-100">
            <!-- Sticky Search Bar -->
            <div class="search-bar-wrapper d-flex align-items-center gap-2 bg-light">
                <div class="flex-grow-1">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" placeholder="Search..." id="searchInput" />
                    </div>
                </div>
                <a href="/admin" class="btn btn-primary flex-shrink-0" id="settingsBtn" title="Settings">
                    <i class="bi bi-gear-fill"></i>
                </a>
            </div>


            <!-- Modal -->
            <div class="modal fade" id="myModal" data-resident="" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="modalLabel" style="margin-right:5px;">Add Beverage To </h5>
                            <h5 class="modal-title resident_name" id="modalLabel"></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mt-3">

                                <div class="row g-3" id="beverageList">
                                    {{range .Beverages}}
                                    <div class="col-12">
                                        <div class="item-card" style="padding: 0.5rem;">
                                            <div class="row" style="padding-right: 2rem; font-size: 18px;">
                                                <div class="col-6">
                                                    <p class="card-text mb-3 beverage_name" style="margin: 0.5rem 0; line-height: 1;">{{.Name}}</p>
                                                </div>
                                                <div class="col-3" style="text-align:center;">
                                                    <p class="card-text mb-3 beverage_price" style="margin: 0.5rem; line-height: 1;" data-price="{{.Price}}">{{trailingZero .Price}}€</p>
                                                </div>
                                                <div class="col-1">
                                                    <button style="padding: 0.5rem;" class="btn btn-sm btn-outline-primary decrement-btn decrement_btn">-</button>
                                                </div>
                                                <div class="col-1" style="text-align:center;">
                                                    <p class="card-text mb-3 beverage_amount" style="margin: 0.5rem 0; line-height: 1;">0</p>
                                                </div>
                                                <div class="col-1" style="padding-left: 0;">
                                                    <button style="padding: 0.5rem;" class="btn btn-sm btn-primary increment-btn increment_btn">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    {{end}}
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button id="submit_order_button" type="button" class="btn btn-primary" data-bs-dismiss="modal">Add</button>

                        </div>
                    </div>
                </div>
            </div>
            <!-- Scrollable list -->
            <div class="list-container mt-3">
                <div class="row g-3" id="gridList">
                    <!-- Full-width special item with two fields -->
                    {{range .Residents}}
                    <div class="col-12">
                        <div id="{{.Room.Floor}}{{leadingZero .Room.Nr}}" class="item-card" style="padding: 0.5rem; font-family: 'Courier', Courier, monospace;">
                            <div class="row">
                                <div class="col-3">
                                    <p class="room" style="margin: 0.25rem 0; line-height: 0.5;">{{leadingZero .Room.Floor}}-{{leadingZero .Room.Nr}}</p>
                                </div>
                                <div class="col">
                                    <p class="name" style="margin: 0.25rem 0; line-height: 0.5;">{{.Name}}</p>
                                </div>
                                <div class="col-3" style="text-align:left;">
                                    <p class="debt" style="margin: 0.25rem 0; line-height: 0.5;">{{trailingZero .Debt}}€</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    {{end}}
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>

        const refreshResidents = async function () {
            const list = document.getElementById("gridList");
            list.innerHTML = '';
            let response = await fetch('/getResidents', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' },
            });
            if(response.ok) {
                let result = await response.json();
                result.residents.forEach((resident) => {
                    const room_floor = resident.Room.Floor;
                    const room_nr = resident.Room.Nr;
                    const name = resident.Name;
                    const debt = resident.Debt;
                    const tmpl = 
                        `<div class="col-12">
<div id="${room_floor}${room_nr.toString().padStart(2, '0')}" class="item-card" style="padding: 0.5rem; font-family: 'Courier', Courier, monospace;">
<div class="row">
<div class="col-3">
<p class="room" style="margin: 0.25rem 0; line-height: 0.5;">${room_floor.toString().padStart(2, '0')}-${room_nr.toString().padStart(2, '0')}</p>
</div>
<div class="col">
<p class="name" style="margin: 0.25rem 0; line-height: 0.5;">${name}</p>
</div>
<div class="col-2">
<p class="debt" style="margin: 0.25rem 0; line-height: 0.5;">${(debt/100).toFixed(2)}€</p>
</div>
</div>
</div>
</div>`;
                    list.insertAdjacentHTML('beforeend', tmpl)
                });
                setUpModal();
            }
        }

        // Simple search filter
        const searchInput = document.getElementById("searchInput");
        const myModalEl = document.getElementById("myModal");
        const myModal = new bootstrap.Modal(myModalEl);
        const setUpModal = function () {
            const residents = document.querySelectorAll("#gridList .item-card");
            residents.forEach((resident) => {
                resident.addEventListener("click", function () {
                    myModalEl.dataset.resident = resident.id;
                    myModalEl.querySelector(".resident_name").textContent = resident.querySelector(".name").textContent;
                    myModal.show();
                });
            });
        }
        setUpModal();
        const resetAmount = function () {
            const beverages = document.querySelectorAll("#beverageList .item-card");
            beverages.forEach((beverage) => {
                const amountEl = beverage.querySelector(".beverage_amount");
                amountEl.textContent = 0;
            });

        }
        searchInput.addEventListener("input", function () {
            const query = this.value.toLowerCase();
            residents.forEach((resident) => {
                const room = resident.querySelector(".room").textContent;
                const name = resident.querySelector(".name").textContent.toLowerCase();
                const id = resident.id;
                resident.parentElement.style.display = (room.includes(query) || name.includes(query) || id.includes(query)) ? "" : "none";
            });
        });
        const beverages = document.querySelectorAll("#beverageList .item-card");
        beverages.forEach((beverage) => {
            const amountEl = beverage.querySelector(".beverage_amount");
            const incrementBtn = beverage.querySelector(".increment_btn");
            const decrementBtn = beverage.querySelector(".decrement_btn");
            incrementBtn.addEventListener("click", () => {
                let amount = parseInt(amountEl.textContent);
                if (amount < 99) {
                    amountEl.textContent = amount + 1;
                }
            });
            decrementBtn.addEventListener("click", () => {
                let amount = parseInt(amountEl.textContent);
                if (amount > 0) {
                    amountEl.textContent = amount - 1;
                }
            });
        });
        document.getElementById("submit_order_button").addEventListener("click", async function (event) {
            const r_floor = (Number(myModalEl.dataset.resident) / 100) | 0;
            const r_nr = Number(myModalEl.dataset.resident) % 100;
            const beverageEls = document.querySelectorAll("#beverageList .item-card");
            let beverages = [];
            beverageEls.forEach((beverage) => {
                const amount = parseInt(beverage.querySelector(".beverage_amount").textContent)
                if (amount > 0) {
                    const nameEl = beverage.querySelector(".beverage_name");
                    beverages.push({Name: nameEl.textContent, Amount: amount});
                }
            });
            const order_data = {
                Beverages: beverages,
                R_floor: r_floor,
                R_nr: r_nr,
            };
            try {
                let response = await fetch('/addOrder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order_data)
                });
                if (!response.ok) {
                    alert('Failed to submit form. Please try again.');
                }else{
                    resetAmount();
                    refreshResidents();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to submit form. Please try again.');
            }
        });
        </script>
    </body>
</html>
