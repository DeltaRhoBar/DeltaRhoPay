
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Login Page</title>
        <link rel="icon" type="image/ico" href="/static/images/favicon.ico">
        <!-- Bootstrap CSS CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    </head>
    <body class="bg-light">

        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="card shadow-sm p-4" style="width: 350px;">
                <h3 class="text-center mb-4">Login</h3>
                <form id="login_form">
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            placeholder="Password"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
        <!-- Bootstrap JS Bundle CDN (Popper + Bootstrap JS) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        loginFormEl = document.getElementById("login_form")
        loginFormEl.addEventListener("submit", async function (event) {
            event.preventDefault();
            const login_data = {
                Password: document.getElementById('password').value,
            };
            try {
                let response = await fetch('/loginData', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(login_data)
                });
                if (!response.ok) {
                    alert('Failed to submit form. Please try again.');
                } else {
                    window.location.href = "/"
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to submit form. Please try again.');
            }
        });
        </script>
    </body>
</html>
